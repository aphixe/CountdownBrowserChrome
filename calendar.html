<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar View</title>
  <link rel="icon" href="icons/icon-128.png">
  <link rel="stylesheet" href="calendar.css">
</head>
<body>
  <main class="calendar-shell">
    <section class="calendar-card">
      <header class="calendar-toolbar">
        <div class="toolbar-group toolbar-left">
          <label class="toolbar-control toolbar-profile">
            <span>Profile</span>
            <select id="profileSelect" aria-label="Calendar profile"></select>
          </label>
          <button id="previousButton" class="toolbar-button" type="button">Prev</button>
          <div id="weekLabel" class="week-label">Apr 6 - Apr 12, 2026</div>
          <button id="nextButton" class="toolbar-button" type="button">Next</button>
          <button id="thisWeekButton" class="toolbar-button" type="button">This Week</button>
          <button id="nowButton" class="toolbar-button" type="button">Now</button>
        </div>
        <div class="toolbar-group toolbar-right">
          <label class="toolbar-control toolbar-scale">
            <span>Scale</span>
            <input id="scaleSlider" type="range" min="0" max="4" value="2" step="1" aria-label="Calendar scale">
            <strong id="scaleLabel">15 min</strong>
          </label>
        </div>
      </header>

      <section id="calendarHeader" class="calendar-header" aria-label="Week header"></section>

      <section class="calendar-body">
        <div id="timeGutter" class="time-gutter" aria-label="Time of day">
          <div id="timeGutterTrack" class="time-gutter-track"></div>
        </div>
        <div id="calendarScroll" class="calendar-scroll">
          <div id="calendarSurface" class="calendar-surface">
            <div id="calendarGrid" class="calendar-grid" aria-label="Calendar grid"></div>
            <div id="calendarBlocks" class="calendar-blocks" aria-hidden="true"></div>
            <div id="nowLine" class="now-line" hidden>
              <span id="nowBubble" class="now-bubble"></span>
            </div>
            <div id="calendarTooltip" class="calendar-tooltip" hidden></div>
            <div id="calendarContextMenu" class="calendar-context-menu" hidden>
              <button id="addTimeButton" class="calendar-context-action" type="button">Add Time</button>
              <button id="editBlockButton" class="calendar-context-action" type="button">Edit</button>
              <button id="deleteBlockButton" class="calendar-context-action" type="button">Delete</button>
              <button id="undoEditButton" class="calendar-context-action" type="button">Undo Last Edit</button>
            </div>
          </div>
        </div>
      </section>

      <footer class="calendar-footer">
        <button id="closeButton" class="toolbar-button close-button" type="button">Close</button>
      </footer>
    </section>
  </main>

  <div id="editDialogBackdrop" class="dialog-backdrop" hidden>
    <section class="edit-dialog" role="dialog" aria-modal="true" aria-labelledby="editDialogTitle">
      <header class="edit-dialog-header">
        <div>
          <h2 id="editDialogTitle">Edit Block Time</h2>
          <p id="editDialogSubtitle" class="edit-dialog-subtitle"></p>
        </div>
      </header>
      <form id="editBlockForm" class="edit-dialog-form">
        <label id="editProfileField" class="edit-field" hidden>
          <span>Profile</span>
          <select id="editProfileSelect" required></select>
        </label>
        <label class="edit-field">
          <span>Start time</span>
          <input id="editStartTimeInput" type="time" required step="60">
        </label>
        <label class="edit-field">
          <span>End time</span>
          <input id="editEndTimeInput" type="time" required step="60">
        </label>
        <p class="edit-dialog-hint">Use hours and minutes. If the end time is earlier than the start time, it will be saved as the next day.</p>
        <div id="editDialogStatus" class="edit-dialog-status" aria-live="polite"></div>
        <div class="edit-dialog-actions">
          <button id="cancelEditButton" class="toolbar-button" type="button">Cancel</button>
          <button id="saveEditButton" class="toolbar-button" type="submit">Save</button>
        </div>
      </form>
    </section>
  </div>

  <script src="shared.js"></script>
  <script src="calendar.js"></script>
</body>
</html>
