<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CountDown Pro</title>
  <link id="pageFavicon" rel="icon" href="icons/icon-128.png">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <section class="card">
      <div class="top-bar">
        <label class="profile-row">
          <span>Profile</span>
          <select id="profileSelect" aria-label="Profile"></select>
        </label>
        <div class="top-bar-actions">
          <button
            id="popOutButton"
            class="icon-button"
            type="button"
            title="Open floating window"
            aria-label="Open floating window"
          >
            &#8599;
          </button>
          <button
            id="openTrendsButton"
            class="icon-button icon-button-image"
            type="button"
            title="Open trends graph"
            aria-label="Open trends graph"
          >
            <img src="icons/graph.png" alt="">
          </button>
          <button
            id="openCalendarButton"
            class="icon-button icon-button-emoji"
            type="button"
            title="Open calendar view"
            aria-label="Open calendar view"
          >
            <span aria-hidden="true">📅</span>
          </button>
          <button
            id="openAddTimeButton"
            class="icon-button"
            type="button"
            title="Add time manually"
            aria-label="Add time manually"
          >
            +
          </button>
          <button
            id="undoAddTimeButton"
            class="icon-button"
            type="button"
            title="Undo last manual add"
            aria-label="Undo last manual add"
          >
            ↺
          </button>
          <button
            id="syncNowButton"
            class="icon-button icon-button-image sync-now-button"
            type="button"
            title="Sync now"
            aria-label="Sync now"
            hidden
          >
            <img src="icons/sync-loop.svg" alt="">
            <span id="syncNowStatus" class="sync-now-status" aria-hidden="true"></span>
          </button>
          <button id="openSettingsButton" class="icon-button" type="button" title="Settings" aria-label="Settings">
            &#9881;
          </button>
        </div>
      </div>

      <div class="timer-block">
        <div id="todayTimer" class="timer-value">00:00:00</div>
        <div id="dayTimeLeft" class="day-left">Day time left: 00:00:00</div>
      </div>

      <section class="goal-progress-block" aria-label="Super goal progress">
        <div class="goal-progress-head">
          <span class="summary-label">Goal progress</span>
          <span id="goalProgressText" class="goal-progress-text">0%</span>
        </div>
        <div class="goal-progress-track">
          <div id="goalProgressFill" class="goal-progress-fill"></div>
        </div>
      </section>

      <div class="summary-row">
        <div class="year-total-wrap">
          <span class="summary-label">Year total:</span>
          <span id="yearTotal" class="summary-value">00:00:00</span>
        </div>
      </div>

      <section id="heatmap" class="heatmap" aria-label="Year activity heatmap"></section>

      <div class="streak-row">
        <div><span class="summary-label">Longest streak:</span> <span id="longestStreak">0 days</span></div>
        <div><span class="summary-label">Current streak:</span> <span id="currentStreak">0 days</span></div>
      </div>

      <div class="goal-row">
        <span id="goalLabel">Super goal: 30m</span>
      </div>

      <div class="button-row">
        <label class="toggle-card" for="autoClockOnAudio">
          <span class="toggle-copy">
            <span class="toggle-title">Auto Clock On</span>
            <span class="toggle-subtitle">Start from tab audio</span>
          </span>
          <input id="autoClockOnAudio" class="toggle-input" type="checkbox">
          <span class="toggle-slider" aria-hidden="true"></span>
        </label>
        <button id="clockButton" class="clock-button" type="button">Clock On</button>
      </div>
    </section>
  </main>

  <div id="manualAddBackdrop" class="dialog-backdrop" hidden>
    <section class="manual-add-dialog" role="dialog" aria-modal="true" aria-labelledby="manualAddTitle">
      <header class="manual-add-header">
        <h2 id="manualAddTitle">Add Time</h2>
        <p class="manual-add-subtitle">Add a manual session starting today at the selected time.</p>
      </header>
      <form id="manualAddForm" class="manual-add-form">
        <label class="manual-add-field">
          <span>Profile</span>
          <select id="manualAddProfileSelect" required></select>
        </label>
        <div class="manual-add-duration">
          <label class="manual-add-field">
            <span>Hours</span>
            <input id="manualAddHoursInput" type="number" min="0" step="1" inputmode="numeric" value="0">
          </label>
          <label class="manual-add-field">
            <span>Minutes</span>
            <input id="manualAddMinutesInput" type="number" min="0" max="59" step="1" inputmode="numeric" value="30">
          </label>
        </div>
        <label class="manual-add-field">
          <span>Start time</span>
          <input id="manualAddStartTimeInput" type="time" required step="60">
        </label>
        <div id="manualAddStatus" class="manual-add-status" aria-live="polite"></div>
        <div class="manual-add-actions">
          <button id="manualAddCancelButton" class="secondary-dialog-button" type="button">Cancel</button>
          <button id="manualAddSaveButton" class="primary-dialog-button" type="submit">Add Time</button>
        </div>
      </form>
    </section>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
